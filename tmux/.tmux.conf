set -g mouse on
set -sg escape-time 10

set-option -g default-command "/bin/zsh"

set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g focus-events on

# Pane styling
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

###########
# Plugins #
###########
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# NOTE: must custom before run `tpm/tpm`.
set -g @tpm-install "I";
set -g @tpm-update "U";
set -g @tpm-clean "u";

#####################
# Tokyo Night Theme #
#####################
# Minimal configuration - only show window tabs
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style none
set -g @tokyo-night-tmux_zoom_id_style none

# Disable all widgets for minimal look
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_battery_widget 0

# Window list styling
set -g @tokyo-night-tmux_show_wbg 1

# Better window naming - use directory name instead of process
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g allow-rename off

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Keep right side empty for minimal look
set -g status-right ""

# Remove console icon from window tabs - simple number and name only
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I #W "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#1a1b26,bold] #I #W "

# Session name with very subtle dark background - reverses colors when prefix is pressed
set -g status-left "#{?client_prefix,#[fg=#24283b]#[bg=#c0caf5],#[fg=#c0caf5]#[bg=#24283b]} #S #[default] "


#############
# Shortcuts #
#############

# Toggle between two panes:
# - If zoomed: unzoom, then jump to the other pane
# - If unzoomed: jump to the other pane, then zoom it
bind-key m if-shell -F '#{window_zoomed_flag}' \
  'resize-pane -Z; last-pane' \
  'last-pane; resize-pane -Z'

# Open lazygit in a new window
bind-key g new-window -n lazygit 'lazygit'

# Cycle sessions
bind-key -r C-n switch-client -n
bind-key -r C-p switch-client -p
bind-key -r C-l switch-client -l

bind-key C-r source-file ~/.tmux.conf
bind-key C-s choose-tree -sZ
